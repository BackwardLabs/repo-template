name: 기능 요청
description: 해결할 문제와 기대 결과를 중심으로 개선 아이디어를 제안해 주세요.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        구현 방법보다 먼저 해결하려는 문제와 사용자에게 필요한 결과를 설명해 주세요.

        GitHub Issues Sync가 활성화된 저장소에서는 이 이슈를 Linear에 다시 만들지 마세요. 동기화된 Linear 이슈가 생성되면 **Copy git branch name**으로 작업 브랜치를 만듭니다.

  - type: checkboxes
    id: duplicate-check
    attributes:
      label: 사전 확인
      options:
        - label: 기존 이슈에서 같은 요청을 찾지 못했습니다.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 누가 어떤 상황에서 무엇 때문에 어려움을 겪고 있나요?
    validations:
      required: true

  - type: textarea
    id: desired-outcome
    attributes:
      label: 기대 결과
      description: 이 요청이 반영되면 사용자가 무엇을 할 수 있어야 하나요?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 방법
      description: 생각한 해결 방법이나 사용자 흐름이 있다면 적어 주세요.

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 완료 조건
      description: 요청이 완료되었다고 판단할 수 있는 조건을 적어 주세요.
      value: |
        - [ ]
    validations:
      required: true

  - type: input
    id: related-repositories
    attributes:
      label: 관련 저장소
      description: 함께 변경해야 할 저장소가 있다면 `owner/repository` 형식으로 적어 주세요.
      placeholder: owner/repository, owner/another-repository

  - type: textarea
    id: alternatives
    attributes:
      label: 검토한 대안
      description: 현재 사용 중인 우회 방법이나 검토했지만 선택하지 않은 방법이 있나요?

  - type: textarea
    id: additional-context
    attributes:
      label: 추가 정보
      description: 관련 문서, 디자인, 예시, 제약 조건을 첨부해 주세요.
