name: 작업 등록
description: 구현, 문서, 운영 등 실행할 작업과 완료 조건을 정의해 주세요.
title: "[Task] "
body:
  - type: markdown
    attributes:
      value: |
        이 GitHub 이슈는 Linear에 자동 생성됩니다. Linear에 같은 이슈를 다시 만들지 마세요. 생성된 Linear 이슈에서 **Copy git branch name**으로 작업 브랜치를 만드세요.

  - type: textarea
    id: objective
    attributes:
      label: 작업 목적
      description: 이 작업이 왜 필요한지와 기대하는 결과를 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 포함할 내용과 명시적으로 제외할 내용을 적어 주세요.
      placeholder: |
        포함:
        -

        제외:
        -
    validations:
      required: true

  - type: input
    id: related-repositories
    attributes:
      label: 관련 저장소
      description: 영향을 받는 모든 저장소를 `owner/repository` 형식으로 적어 주세요.
      placeholder: owner/repository, owner/another-repository
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 완료 조건
      description: 검증 가능한 결과 단위로 적어 주세요.
      value: |
        - [ ]
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: 의존성과 진행 순서
      description: 선행 작업, 관련 이슈와 PR, 병합 또는 배포 순서를 적어 주세요.

  - type: textarea
    id: risks
    attributes:
      label: 영향 및 위험
      description: 호환성, 데이터, 권한, 보안, 운영상 주의할 점을 적어 주세요.
